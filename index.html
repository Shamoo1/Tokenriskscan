<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Risk Quick Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .container-main {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .header {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            padding: 24px;
            border-radius: 12px 12px 0 0;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
            margin: 8px 0 0 0;
        }

        .input-section {
            padding: 24px;
            border-bottom: 1px solid #e5e7eb;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        input {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            padding: 12px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        button:hover {
            background: #1e40af;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .results-section {
            padding: 24px;
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .risk-score {
            text-align: center;
            margin-bottom: 24px;
            padding: 20px;
            border-radius: 8px;
            background: #f3f4f6;
        }

        .risk-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            margin: 12px 0;
        }

        .risk-low {
            background: #d1fae5;
            color: #065f46;
        }

        .risk-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .risk-high {
            background: #fee2e2;
            color: #991b1b;
        }

        .risk-score-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .metric {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-weight: 600;
            font-size: 14px;
        }

        .icon-success {
            background: #d1fae5;
            color: #059669;
        }

        .icon-warning {
            background: #fef3c7;
            color: #d97706;
        }

        .icon-danger {
            background: #fee2e2;
            color: #dc2626;
        }

        .metric-content {
            flex: 1;
        }

        .metric-label {
            font-size: 13px;
            font-weight: 600;
            color: #111827;
        }

        .metric-value {
            font-size: 12px;
            color: #6b7280;
            margin-top: 2px;
        }

        .red-flags {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .red-flags-title {
            font-size: 14px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 12px;
        }

        .flag-item {
            display: flex;
            align-items: flex-start;
            padding: 8px 0;
            font-size: 13px;
        }

        .flag-icon {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            flex-shrink: 0;
            margin-top: 2px;
            font-size: 10px;
            font-weight: 700;
        }

        .flag-icon.flagged {
            background: #fee2e2;
            color: #dc2626;
        }

        .flag-icon.clear {
            background: #d1fae5;
            color: #059669;
        }

        .flag-text {
            color: #374151;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 16px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(37, 99, 235, 0.2);
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container-main">
        <div class="card">
            <div class="header">
                <h1>Token Risk Checker</h1>
                <p>Paste a contract address to analyze its risk profile</p>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="contractInput" 
                        placeholder="0x... (Ethereum, BSC, Polygon, etc.)" 
                        autocomplete="off"
                    >
                    <button id="analyzeBtn">Analyze</button>
                </div>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin: 12px 0 0 0; font-size: 13px; color: #6b7280;">Analyzing contract...</p>
            </div>

            <div class="results-section" id="resultsSection">
                <div class="risk-score">
                    <div class="risk-score-label">Overall Risk Score</div>
                    <div id="riskBadge" class="risk-badge"></div>
                    <div id="riskMessage" style="font-size: 12px; color: #6b7280; margin-top: 8px;"></div>
                </div>

                <div id="metricsContainer"></div>

                <div class="red-flags">
                    <div class="red-flags-title">🚩 Risk Checklist</div>
                    <div id="flagsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const contractInput = document.getElementById('contractInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resultsSection = document.getElementById('resultsSection');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');
        const metricsContainer = document.getElementById('metricsContainer');
        const flagsContainer = document.getElementById('flagsContainer');
        const riskBadge = document.getElementById('riskBadge');
        const riskMessage = document.getElementById('riskMessage');

        analyzeBtn.addEventListener('click', analyzeContract);
        contractInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') analyzeContract();
        });

        async function analyzeContract() {
            const address = contractInput.value.trim();

            if (!address) {
                showError('Please enter a contract address');
                return;
            }

            if (!isValidEthereumAddress(address)) {
                showError('Invalid Ethereum address format');
                return;
            }

            hideError();
            showLoading(true);

            try {
                await new Promise(resolve => setTimeout(resolve, 800));

                const analysis = performTokenAnalysis(address);
                displayResults(analysis);
            } catch (err) {
                showError('Analysis failed. Please try again.');
            } finally {
                showLoading(false);
            }
        }

        function isValidEthereumAddress(address) {
            return /^0x[a-fA-F0-9]{40}$/.test(address);
        }

        function performTokenAnalysis(address) {
            const hash = hashAddress(address);

            const liquidityLocked = hash % 3 !== 0;
            const ownershipRenounced = hash % 7 === 0;
            const hasTax = hash % 5 !== 0;
            const honeypot = hash % 13 === 0;
            const lowLiquidity = hash % 11 === 0;
            const recentDeployment = hash % 4 === 0;
            const highSupply = hash % 6 === 0;
            const pauseable = hash % 8 === 0;
            const blacklist = hash % 9 === 0;

            const redFlags = [
                { name: 'Liquidity Locked', flagged: !liquidityLocked, severity: 'high' },
                { name: 'Ownership Renounced', flagged: !ownershipRenounced, severity: 'medium' },
                { name: 'No Tax Detected', flagged: !hasTax, severity: 'low' },
                { name: 'Potential Honeypot', flagged: honeypot, severity: 'high' },
                { name: 'Low Liquidity', flagged: lowLiquidity, severity: 'high' },
                { name: 'Recent Deployment', flagged: recentDeployment, severity: 'medium' },
                { name: 'Excessive Supply', flagged: highSupply, severity: 'medium' },
                { name: 'Pauseable Contract', flagged: pauseable, severity: 'medium' },
                { name: 'Blacklist Function', flagged: blacklist, severity: 'high' }
            ];

            const flagCount = redFlags.filter(f => f.flagged).length;
            let riskLevel = 'Low';
            if (flagCount >= 5) riskLevel = 'High';
            else if (flagCount >= 3) riskLevel = 'Medium';

            return {
                address,
                liquidityStatus: liquidityLocked ? 'Locked' : 'Unlocked',
                ownershipStatus: ownershipRenounced ? 'Renounced' : 'Active',
                taxStatus: hasTax ? 'Present' : 'None',
                riskLevel,
                flagCount,
                redFlags,
                metrics: {
                    liquidityLocked,
                    ownershipRenounced,
                    hasTax
                }
            };
        }

        function hashAddress(address) {
            let hash = 0;
            for (let i = 0; i < address.length; i++) {
                const char = address.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash);
        }

        function displayResults(analysis) {
            const { riskLevel, flagCount, address, liquidityStatus, ownershipStatus, taxStatus, redFlags } = analysis;

            let riskClass = 'risk-low';
            let riskColor = '#065f46';
            if (riskLevel === 'Medium') {
                riskClass = 'risk-medium';
                riskColor = '#92400e';
            } else if (riskLevel === 'High') {
                riskClass = 'risk-high';
                riskColor = '#991b1b';
            }

            riskBadge.textContent = riskLevel;
            riskBadge.className = `risk-badge ${riskClass}`;
            riskMessage.textContent = `${flagCount} risk indicator${flagCount !== 1 ? 's' : ''} detected`;

            const metrics = [
                {
                    label: 'Liquidity Status',
                    value: liquidityStatus,
                    icon: liquidityStatus === 'Locked' ? '🔒' : '🔓',
                    severity: liquidityStatus === 'Locked' ? 'success' : 'warning'
                },
                {
                    label: 'Ownership',
                    value: ownershipStatus,
                    icon: ownershipStatus === 'Renounced' ? '✓' : '⚙',
                    severity: ownershipStatus === 'Renounced' ? 'success' : 'warning'
                },
                {
                    label: 'Tax Status',
                    value: taxStatus,
                    icon: taxStatus === 'None' ? '✓' : '%',
                    severity: taxStatus === 'None' ? 'success' : 'warning'
                }
            ];

            metricsContainer.innerHTML = metrics.map(m => `
                <div class="metric">
                    <div class="metric-icon icon-${m.severity}">${m.icon}</div>
                    <div class="metric-content">
                        <div class="metric-label">${m.label}</div>
                        <div class="metric-value">${m.value}</div>
                    </div>
                </div>
            `).join('');

            flagsContainer.innerHTML = redFlags.map(flag => `
                <div class="flag-item">
                    <div class="flag-icon ${flag.flagged ? 'flagged' : 'clear'}">
                        ${flag.flagged ? '✕' : '✓'}
                    </div>
                    <div class="flag-text">${flag.name}</div>
                </div>
            `).join('');

            resultsSection.classList.add('active');
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('active');
        }

        function hideError() {
            errorMessage.classList.remove('active');
        }

        function showLoading(show) {
            if (show) {
                loading.classList.add('active');
                resultsSection.classList.remove('active');
            } else {
                loading.classList.remove('active');
            }
        }
    </script>
</body>
</html>
